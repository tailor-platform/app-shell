name: Doc Check

on:
  pull_request:
    paths:
      - "docs/**/*.md"
  workflow_dispatch:

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check links in docs
        uses: lycheeverse/lychee-action@v2
        with:
          args: |
            --no-progress
            --exclude 'mailto:'
            'docs/**/*.md'
          fail: true
